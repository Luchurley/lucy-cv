<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframes Mobile · CV Interactif Lucy Hurley</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="wf-styles.css">

<style>
  html, body { margin: 0; padding: 0; }
  body { background: #f0eee9; font-family: 'Space Mono', monospace; }
  #app { width: 100vw; height: 100vh; }

  /* Tap pulse animation used in flow hints */
  @keyframes tapPulse {
    0%   { transform: scale(0.8); opacity: 1; box-shadow: 0 0 0 0 rgba(255,0,85,0.4); }
    70%  { transform: scale(1.1); opacity: 0.7; box-shadow: 0 0 0 14px rgba(255,0,85,0); }
    100% { transform: scale(0.8); opacity: 1; box-shadow: 0 0 0 0 rgba(255,0,85,0); }
  }

  /* DesignCanvas tweaks — make backgrounds neutral so wireframes stand out */
  .dc-card { background: transparent !important; }

  @keyframes demoFadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wf-primitives.jsx"></script>
<script type="text/babel" src="wf-screens.jsx"></script>
<script type="text/babel" src="wf-components.jsx"></script>
<script type="text/babel" src="wf-app.jsx"></script>

</body>
</html>
